/* PCD Server Configuration File
 * Parsed at startup via libconfig.
 * All paths and ports can be overridden by CLI arguments.
 */

server:
{
    /* INET TCP server settings */
    inet_port   = 18081;

    /* SOAP/gsoap server settings */
    soap_port   = 18082;

    /* UNIX domain socket path */
    unix_socket = "/tmp/unixds";

    /* Maximum pending connections in listen() backlog */
    backlog     = 10;

    /* Enable SO_REUSEADDR on all sockets (1 = yes, 0 = no) */
    reuse_addr  = 1;
};

logging:
{
    /* Log verbosity: 0 = errors only, 1 = info, 2 = debug */
    level       = 1;

    /* Log destination: "stderr" or a file path */
    destination = "stderr";
};

demo:
{
    /* Settings used by the fork()-based libconfig demo in main */
    input_string  = "Hello from libconfig!";
    input_int1    = 42;
    input_int2    = 58;
};

solver:
{
    /* T26 — Linear system solver (OPR_SOLVE)                        */
    /* Number of child processes to fork for parallel solving.       */
    /* Set to 1 to always use the serial LAPACKE path.               */
    workers          = 4;

    /* Systems smaller than this order are solved serially (no fork) */
    serial_threshold = 32;
};
