/* Fisier de configurare pentru serverul PCD
 * Parsat la pornire cu libconfig.
 * Toate caile si porturile pot fi suprascrise prin argumente CLI.
 */

server:
{
    /* Setari pentru serverul INET TCP */
    inet_port   = 18081;

    /* Setari pentru serverul SOAP/gsoap */
    soap_port   = 18082;

    /* Cale catre socket-ul UNIX domain */
    unix_socket = "/tmp/unixds";

    /* Numar maxim de conexiuni in asteptare (backlog) pentru listen() */
    backlog     = 10;

    /* Activeaza SO_REUSEADDR pe toate socket-urile (1 = da, 0 = nu) */
    reuse_addr  = 1;
};

logging:
{
    /* Verbositate log: 0 = doar erori, 1 = info, 2 = debug */
    level       = 1;

    /* Destinatie log: "stderr" sau o cale catre fisier */
    destination = "stderr";
};

demo:
{
    /* Setari folosite de demo-ul libconfig bazat pe fork() din main */
    input_string  = "Hello from libconfig!";
    input_int1    = 42;
    input_int2    = 58;
};

solver:
{
    /* T26 — Rezolvator sistem liniar (OPR_SOLVE)                    */
    /* Numar de procese copil (fork) pentru rezolvare paralela.      */
    /* Seteaza 1 ca sa folosesti mereu calea seriala LAPACKE.        */
    workers          = 4;

    /* Sistemele sub acest ordin sunt rezolvate serial (fara fork) */
    serial_threshold = 32;
};
